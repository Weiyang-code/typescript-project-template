services:
  app:
    build: .
    ports:
      - "8180:8180"
    environment:
      - NODE_ENV=production
      - DB_HOST=db  # CRITICAL: Use the service name 'db' instead of 'localhost'
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oee
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata: